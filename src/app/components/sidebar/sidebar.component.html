<aside class="sidebar" [class.collapsed]="collapsed">

    <!-- Header -->
    <div class="sidebar-header">
        <div class="logo-section" *ngIf="!collapsed">
            <i class="pi pi-shield logo-icon"></i>
            <span class="logo-text">{{ projectName }}</span>
        </div>
        <button class="toggle-btn" (click)="toggleSidebar()">
            <i class="pi pi-bars"></i>
        </button>
    </div>

    <!-- Menu -->
    <nav class="sidebar-menu">
        <a routerLink="/home" routerLinkActive="active-menu-item" class="menu-item">
            <i class="pi pi-home"></i>
            <span *ngIf="!collapsed">Home</span>
        </a>
        <a routerLink="/group" routerLinkActive="active-menu-item" class="menu-item">
            <i class="pi pi-users"></i>
            <span *ngIf="!collapsed">Group</span>
        </a>
        <a routerLink="/ticket" routerLinkActive="active-menu-item" class="menu-item">
            <i class="pi pi-ticket"></i>
            <span *ngIf="!collapsed">Ticket</span>
        </a>
        <a routerLink="/user" routerLinkActive="active-menu-item" class="menu-item">
            <i class="pi pi-user"></i>
            <span *ngIf="!collapsed">User</span>
        </a>
    </nav>

    <!-- Footer -->
    <div class="sidebar-footer">
        <div class="version-info" *ngIf="!collapsed">
            <span class="version-label">Version</span>
            <span class="version-number">{{ appVersion }}</span>
        </div>
        <span class="version-number-small" *ngIf="collapsed">v{{ appVersion }}</span>
    </div>
</aside>
