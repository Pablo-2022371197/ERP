<div class="dashboard-container px-6!">
    <!-- Header Section -->
    <app-dashboard-header [currentUser]="currentUser" [totalTickets]="totalTickets"></app-dashboard-header>

    <!-- Main Content Grid -->
    <div class="grid! grid-cols-15! gap-6!">
        <!-- Left Sidebar - Recent Tickets -->
        <div class="col-span-3!">
            <app-recent-tickets-sidebar [recentTickets]="recentTickets" (ticketClick)="viewTicket($event)">
            </app-recent-tickets-sidebar>
        </div>

        <!-- Main Content -->
        <div class="col-span-12!">
            <!-- Group Selector and Filters Section -->
            <app-ticket-filters [userGroups]="userGroups" [selectedGroup]="selectedGroup" [isKanbanView]="isKanbanView"
                [filterOptions]="filterOptions" (groupChange)="onGroupChange($event)"
                (viewModeChange)="onViewModeChange($event)" (filterChange)="onFilterChange($event)"
                (clearFiltersClick)="onClearFilters()" (createTicketClick)="createTicket()">
            </app-ticket-filters>

            <!-- Kanban View -->
            @if (isKanbanView) {
            <app-kanban-board [tickets]="displayedTickets" [ticketsByStatus]="ticketsByStatus"
                (ticketClick)="viewTicket($event)">
            </app-kanban-board>
            }

            <!-- List View -->
            @if (!isKanbanView) {
            <app-ticket-list [tickets]="displayedTickets" (ticketClick)="viewTicket($event)">
            </app-ticket-list>
            }
        </div>
    </div>

    <!-- Ticket View Dialog -->
    <app-ticket-view [(visible)]="showTicketDialog" [ticket]="selectedTicket" (onClose)="closeTicketDialog()">
    </app-ticket-view>

    <!-- Ticket Form Dialog -->
    <app-ticket-form [(visible)]="showTicketFormDialog" [isEditMode]="isEditMode" [ticket]="ticketToEdit"
        [estadoOptions]="estadoOptions" [prioridadOptions]="prioridadOptions" (onSave)="saveTicket($event)"
        (onCancel)="cancelTicketForm()">
    </app-ticket-form>
</div>
