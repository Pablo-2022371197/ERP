<div class="group-container">
    <!-- Header Section with Total -->
    <div class="header-section">
        <div class="total-card">
            <div class="total-content">
                <div class="total-icon">
                    <i class="pi pi-users"></i>
                </div>
                <div class="total-info">
                    <h3>Total Groups</h3>
                    <p class="total-number">{{ totalGroups }}</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Table Section Title -->
    <div class="section-title">
        <h2>
            <i class="pi pi-table"></i>
            Grupos
        </h2>
        <p-button *ifHasPermission="'groups_add'" icon="pi pi-plus" label="Nuevo Grupo" severity="primary"
            [rounded]="true" (onClick)="openNewGroupDialog()"></p-button>
    </div>

    <!-- Groups Table -->
    <div class="table-container">
        <p-table [value]="groups" [paginator]="true" [rows]="5" [rowsPerPageOptions]="[5, 10, 25]"
            [showCurrentPageReport]="true"
            currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} grupos"
            [tableStyle]="{ 'min-width': '60rem' }" styleClass="p-datatable-striped p-datatable-gridlines"
            [globalFilterFields]="['nombre', 'autor', 'nivel', 'descripcion']">

            <ng-template #header>
                <tr>
                    <th pSortableColumn="nivel" class="text-center">
                        <div class=" flex items-center gap-2">
                            Nivel
                            <p-sortIcon field="nivel"></p-sortIcon>
                        </div>
                    </th>
                    <th pSortableColumn="autor">
                        <div class="flex items-center gap-2 min-w-30">
                            Autor
                            <p-sortIcon field="autor"></p-sortIcon>
                        </div>
                    </th>
                    <th pSortableColumn="nombre">
                        <div class="flex items-center gap-2 min-w-30">
                            Nombre
                            <p-sortIcon field="nombre"></p-sortIcon>
                        </div>
                    </th>
                    <th pSortableColumn="integrantes" class="text-center">
                        <div class="flex items-center justify-center gap-2 max-w-24">
                            Integrantes
                            <p-sortIcon field="integrantes"></p-sortIcon>
                        </div>
                    </th>
                    <th pSortableColumn="tickets" class="text-center">
                        <div class="flex items-center justify-center gap-2 min-w-20 max-w-24">
                            Tickets
                            <p-sortIcon field="tickets"></p-sortIcon>
                        </div>
                    </th>
                    <th class="min-w-60">Descripción</th>
                    <th class="text-center">Acciones</th>
                </tr>
            </ng-template>

            <ng-template #body let-group>
                <tr>
                    <td class="text-center">
                        <p-tag [value]="group.nivel" [severity]="getNivelSeverity(group.nivel)"
                            [rounded]="true"></p-tag>
                    </td>
                    <td>
                        <div class="flex items-center gap-2">
                            <span
                                class="flex items-center justify-center min-w-8 min-h-8 rounded-full bg-indigo-100 text-indigo-600 font-semibold text-sm shrink-0">
                                {{ getInitials(group.autor) }}
                            </span>
                            <span class="font-medium text-gray-800">{{ group.autor }}</span>
                        </div>
                    </td>
                    <td>
                        <span class="font-semibold text-indigo-600">{{ group.nombre }}</span>
                    </td>
                    <td class="text-center">
                        <div class="flex items-center justify-center gap-1">
                            <i class="pi pi-users text-gray-400"></i>
                            <span class="font-medium">{{ group.integrantes }}</span>
                        </div>
                    </td>
                    <td class="text-center">
                        <div class="inline-flex items-center justify-center scale-125 w-full">
                            <p-badge [value]="group.tickets" severity="info"></p-badge>
                        </div>
                    </td>
                    <td>
                        <span class="text-gray-600 text-sm line-clamp-2">{{ group.descripcion }}</span>
                    </td>
                    <td class="text-center">
                        <div class="flex items-center justify-center gap-1">
                            <p-button icon="pi pi-eye" [rounded]="true" [text]="true" severity="info" size="small"
                                (onClick)="viewGroup(group)"></p-button>
                            <p-button icon="pi pi-pencil" [rounded]="true" [text]="true" severity="secondary"
                                size="small" (onClick)="editGroup(group)"></p-button>
                            <p-button icon="pi pi-trash" [rounded]="true" [text]="true" severity="danger" size="small"
                                (onClick)="deleteGroup(group)"></p-button>
                        </div>
                    </td>
                </tr>
            </ng-template>

            <ng-template #emptymessage>
                <tr>
                    <td colspan="7" class="text-center py-8">
                        <div class="flex flex-col items-center gap-2 text-gray-400">
                            <i class="pi pi-inbox text-4xl"></i>
                            <span>No se encontraron grupos</span>
                        </div>
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>
</div>

<!-- Group Form Component (Create/Edit) -->
<app-group-form [(visible)]="displayGroupDialog" [isEditMode]="isEditMode" [group]="editingGroup"
    [nivelOptions]="nivelOptions" [availableUsers]="availableUsers" (onSave)="onSaveGroup($event)"
    (onCancel)="onCancelGroupForm()">
</app-group-form>

<!-- Group View Component -->
<app-group-view [(visible)]="displayViewDialog" [group]="viewingGroup" (onClose)="onCloseView()">
</app-group-view>
