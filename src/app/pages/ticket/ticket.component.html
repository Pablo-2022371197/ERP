<div class="ticket-container">
    <!-- Header Section with Total -->
    <div class="header-section">
        <div class="total-card">
            <div class="total-content">
                <div class="total-icon">
                    <i class="pi pi-ticket"></i>
                </div>
                <div class="total-info">
                    <h3>Total Tickets</h3>
                    <p class="total-number">{{ totalTickets }}</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Table Section Title -->
    <div class="section-title">
        <h2>
            <i class="pi pi-table"></i>
            Tickets
        </h2>
        <p-button *ifHasPermission="'tickets_add'" icon="pi pi-plus" label="Nuevo Ticket" severity="primary"
            [rounded]="true" (onClick)="openNewTicketDialog()"></p-button>
    </div>

    <!-- Tickets Table -->
    <div class="table-container">
        <p-table [value]="tickets" [paginator]="true" [rows]="5" [rowsPerPageOptions]="[5, 10, 25]"
            [showCurrentPageReport]="true"
            currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} tickets"
            [tableStyle]="{ 'min-width': '60rem' }" styleClass="p-datatable-striped p-datatable-gridlines"
            [globalFilterFields]="['titulo', 'asignadoA', 'estado', 'prioridad']">

            <ng-template #header>
                <tr>
                    <th pSortableColumn="titulo">
                        <div class="flex items-center gap-2 min-w-40">
                            Título
                            <p-sortIcon field="titulo"></p-sortIcon>
                        </div>
                    </th>
                    <th pSortableColumn="estado" class="text-center">
                        <div class="flex items-center justify-center gap-2">
                            Estado
                            <p-sortIcon field="estado"></p-sortIcon>
                        </div>
                    </th>
                    <th pSortableColumn="prioridad" class="text-center">
                        <div class="flex items-center justify-center gap-2">
                            Prioridad
                            <p-sortIcon field="prioridad"></p-sortIcon>
                        </div>
                    </th>
                    <th pSortableColumn="asignadoA">
                        <div class="flex items-center gap-2 min-w-32">
                            Asignado a
                            <p-sortIcon field="asignadoA"></p-sortIcon>
                        </div>
                    </th>
                    <th pSortableColumn="fechaCreacion" class="text-center">
                        <div class="flex items-center justify-center gap-2">
                            Fecha Creación
                            <p-sortIcon field="fechaCreacion"></p-sortIcon>
                        </div>
                    </th>
                    <th pSortableColumn="fechaLimite" class="text-center">
                        <div class="flex items-center justify-center gap-2">
                            Fecha Límite
                            <p-sortIcon field="fechaLimite"></p-sortIcon>
                        </div>
                    </th>
                    <th class="text-center">Acciones</th>
                </tr>
            </ng-template>

            <ng-template #body let-ticket>
                <tr>
                    <td>
                        <span class="font-semibold text-indigo-600">{{ ticket.titulo }}</span>
                    </td>
                    <td class="text-center">
                        <p-tag [value]="ticket.estado" [severity]="getEstadoSeverity(ticket.estado)"
                            [rounded]="true"></p-tag>
                    </td>
                    <td class="text-center">
                        <div class="flex items-center justify-center">
                            <p-tag [value]="ticket.prioridad" [severity]="getPrioridadSeverity(ticket.prioridad)"
                                [rounded]="true"></p-tag>
                        </div>
                    </td>
                    <td>
                        <div class="flex items-center gap-2">
                            <span
                                class="flex items-center justify-center min-w-8 min-h-8 rounded-full bg-indigo-100 text-indigo-600 font-semibold text-sm shrink-0">
                                {{ getInitials(ticket.asignadoA) }}
                            </span>
                            <span class="font-medium text-gray-800">{{ ticket.asignadoA }}</span>
                        </div>
                    </td>
                    <td class="text-center">
                        <span class="text-gray-600 text-sm">{{ formatDate(ticket.fechaCreacion) }}</span>
                    </td>
                    <td class="text-center">
                        <span class="text-gray-600 text-sm">{{ formatDate(ticket.fechaLimite) }}</span>
                    </td>
                    <td class="text-center">
                        <div class="flex items-center justify-center gap-1">
                            <p-button icon="pi pi-eye" [rounded]="true" [text]="true" severity="info"
                                (onClick)="viewTicket(ticket)"></p-button>
                            <p-button icon="pi pi-pencil" [rounded]="true" [text]="true" severity="secondary"
                                (onClick)="editTicket(ticket)"></p-button>
                            <p-button icon="pi pi-trash" [rounded]="true" [text]="true" severity="danger"
                                (onClick)="deleteTicket(ticket)"></p-button>
                        </div>
                    </td>
                </tr>
            </ng-template>

            <ng-template #emptymessage>
                <tr>
                    <td colspan="8" class="text-center py-8">
                        <div class="flex flex-col items-center gap-2 text-gray-400">
                            <i class="pi pi-inbox text-4xl"></i>
                            <span>No se encontraron tickets</span>
                        </div>
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>
</div>

<!-- Ticket Form Component (Create/Edit) -->
<app-ticket-form [(visible)]="displayTicketDialog" [isEditMode]="isEditMode" [ticket]="editingTicket"
    [estadoOptions]="estadoOptions" [prioridadOptions]="prioridadOptions" (onSave)="onSaveTicket($event)"
    (onCancel)="onCancelTicketForm()">
</app-ticket-form>

<!-- Ticket View Component -->
<app-ticket-view [(visible)]="displayViewDialog" [ticket]="viewingTicket" (onClose)="onCloseView()">
</app-ticket-view>
