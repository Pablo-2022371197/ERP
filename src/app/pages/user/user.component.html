<div class="user-container">
    <!-- Header Section -->
    <div class="profile-header">
        <div class="status-badge absolute flex items-center gap-1 text-sm font-semibold rounded-full opacity-90"
            [class.bg-green-100]="userProfile.status === 'Active'"
            [class.text-green-700]="userProfile.status === 'Active'"
            [class.bg-gray-100]="userProfile.status !== 'Active'"
            [class.text-gray-600]="userProfile.status !== 'Active'">

            <span class="size-3 rounded-full" [class.bg-green-500]="userProfile.status === 'Active'"
                [class.bg-green-500]="userProfile.status === 'Active'"
                [class.bg-gray-500]="userProfile.status !== 'Active'">
            </span>
            @if(userProfile.status==='Active') {
            <span class="absolute size-3 rounded-full bg-green-500 animate-ping"></span>
            }

            <span>{{ userProfile.status }}</span>

        </div>

        <p-avatar [label]=" userInitials" size="xlarge" shape="circle"
            [style]="{ 'background-color': '#ffffff', 'color': '#667eea', 'font-size': '2rem' }">
        </p-avatar>
        <h1 class="profile-name">{{ userProfile.name }}</h1>
        <p class="profile-role">{{ userProfile.role }}</p>
    </div>

    <!-- Info Grid -->
    <div class="info-grid">
        <!-- Email -->
        <div class="info-card">
            <div class="info-icon">
                <i class="pi pi-envelope"></i>
            </div>
            <div class="info-content">
                <span class="info-label">Email</span>
                <span class="info-value">{{ userProfile.email }}</span>
            </div>
        </div>

        <!-- Phone -->
        <div class="info-card">
            <div class="info-icon">
                <i class="pi pi-phone"></i>
            </div>
            <div class="info-content">
                <span class="info-label">Phone</span>
                <span class="info-value">{{ userProfile.phone }}</span>
            </div>
        </div>

        <!-- Department -->
        <div class="info-card">
            <div class="info-icon">
                <i class="pi pi-building"></i>
            </div>
            <div class="info-content">
                <span class="info-label">Department</span>
                <span class="info-value">{{ userProfile.department }}</span>
            </div>
        </div>

        <!-- Join Date -->
        <div class="info-card">
            <div class="info-icon">
                <i class="pi pi-calendar"></i>
            </div>
            <div class="info-content">
                <span class="info-label">Join Date</span>
                <span class="info-value">{{ userProfile.joinDate }}</span>
            </div>
        </div>
    </div>

    <!-- Actions -->
    <div class="profile-actions">
        <p-button label="Edit Profile" icon="pi pi-user-edit" severity="primary"></p-button>
        <p-button label="Change Password" icon="pi pi-lock" severity="secondary"></p-button>
    </div>
</div>
